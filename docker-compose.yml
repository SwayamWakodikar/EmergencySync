version: "3.9"

services:
  db:
    image: postgres:15
    container_name: emergencysync_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emergencysync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: emergencysync_server
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: emergencysync
      DB_PORT: 5432

volumes:
  pgdata: